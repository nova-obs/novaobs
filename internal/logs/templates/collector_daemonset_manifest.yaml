apiVersion: v1
kind: Namespace
metadata:
  name: {{ .AgentNamespace }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .AgentName }}
  namespace: {{ .AgentNamespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .AgentName }}
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .AgentName }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .AgentName }}
subjects:
  - kind: ServiceAccount
    name: {{ .AgentName }}
    namespace: {{ .AgentNamespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .AgentName }}-config
  namespace: {{ .AgentNamespace }}
data:
  collector.yaml: |
{{ .CollectorConfigBlock }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .AgentName }}
  namespace: {{ .AgentNamespace }}
  labels:
    app.kubernetes.io/name: {{ .AgentName }}
    app.kubernetes.io/part-of: novaobs
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .AgentName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .AgentName }}
        app.kubernetes.io/part-of: novaobs
      annotations:
        novaobs.io/config-hash: {{ .ConfigHash }}
    spec:
      serviceAccountName: {{ .AgentName }}
      containers:
        - name: otelcol
          image: hub-test.service.ucloud.cn/logsplatfrom/opentelemetry-collector-contrib:0.153.0
          args: ["--config=/conf/collector.yaml"]
          env:
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
            - name: pod-logs
              mountPath: /var/log/pods
              readOnly: true
            - name: container-logs
              mountPath: /var/log/containers
              readOnly: true
            - name: docker-container-logs
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: offset-storage
              mountPath: /var/lib/otelcol
      volumes:
        - name: config
          configMap:
            name: {{ .AgentName }}-config
        - name: pod-logs
          hostPath:
            path: /var/log/pods
            type: DirectoryOrCreate
        - name: container-logs
          hostPath:
            path: /var/log/containers
            type: DirectoryOrCreate
        - name: docker-container-logs
          hostPath:
            path: /var/lib/docker/containers
            type: DirectoryOrCreate
        - name: offset-storage
          emptyDir: {}
