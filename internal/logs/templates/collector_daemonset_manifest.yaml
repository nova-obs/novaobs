apiVersion: v1
kind: Namespace
metadata:
  name: {{ .AgentNamespace }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .AgentName }}
  namespace: {{ .AgentNamespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .AgentName }}
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .AgentName }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .AgentName }}
subjects:
  - kind: ServiceAccount
    name: {{ .AgentName }}
    namespace: {{ .AgentNamespace }}
{{- range .ConfigMaps }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Name }}
  namespace: {{ $.AgentNamespace }}
  labels:
    app.kubernetes.io/name: {{ $.AgentName }}
    app.kubernetes.io/part-of: novaapm
    novaapm.io/config-role: {{ .Role }}
  annotations:
    novaapm.io/config-hash: {{ .ConfigHash | printf "%q" }}
    {{ if .RouteID }}
    novaapm.io/log-route-id: {{ .RouteID | printf "%q" }}
    {{ end }}
    {{ if .ServiceID }}
    novaapm.io/service-id: {{ .ServiceID | printf "%q" }}
    {{ end }}
data:
  {{ .DataKey }}: |
{{ .ContentBlock }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .AgentName }}
  namespace: {{ .AgentNamespace }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8888"
  labels:
    app.kubernetes.io/name: {{ .AgentName }}
    app.kubernetes.io/part-of: novaapm
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ .AgentName }}
  ports:
    - name: metrics
      port: 8888
      targetPort: metrics
    - name: health
      port: 13133
      targetPort: health
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .AgentName }}
  namespace: {{ .AgentNamespace }}
  labels:
    app.kubernetes.io/name: {{ .AgentName }}
    app.kubernetes.io/part-of: novaapm
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .AgentName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .AgentName }}
        app.kubernetes.io/part-of: novaapm
      annotations:
        novaapm.io/config-hash: {{ .ConfigHash }}
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8888"
    spec:
      serviceAccountName: {{ .AgentName }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: otelcol
          image: __NOVAAPM_IMAGE_OTEL_COLLECTOR__
          args:
            {{ range .ConfigArgs }}
            - {{ . | printf "%q" }}
            {{ end }}
          ports:
            - name: metrics
              containerPort: 8888
            - name: health
              containerPort: 13133
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: KUBE_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KUBE_POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: KUBE_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NOVAAPM_CLUSTER_ID
              value: {{ .ClusterID | printf "%q" }}
            - name: NOVAAPM_COLLECTOR_GROUP_ID
              value: {{ .CollectorGroupID | printf "%q" }}
            - name: NOVAAPM_AGENT_NAMESPACE
              value: {{ .AgentNamespace | printf "%q" }}
            {{- if .OpAMPEnabled }}
            - name: NOVAAPM_OPAMP_ENDPOINT
              value: {{ .OpAMPEndpoint | printf "%q" }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
            - name: pod-logs
              mountPath: /var/log/pods
              readOnly: true
            {{- range .RuntimeLogMounts }}
            - name: {{ .Name }}
              mountPath: {{ .Path }}
              readOnly: true
            {{- end }}
            - name: offset-storage
              mountPath: /var/lib/otelcol
      volumes:
        - name: config
          projected:
            defaultMode: 0444
            sources:
              {{ range .ConfigMaps }}
              - configMap:
                  name: {{ .Name }}
                  items:
                    - key: {{ .DataKey }}
                      path: {{ .MountPath }}
              {{ end }}
        - name: pod-logs
          hostPath:
            path: /var/log/pods
            type: Directory
        {{- range .RuntimeLogMounts }}
        - name: {{ .Name }}
          hostPath:
            path: {{ .Path }}
            type: Directory
        {{- end }}
        - name: offset-storage
          emptyDir: {}
