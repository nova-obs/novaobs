openapi: 3.0.3
info:
  title: 统一可观测性平台后端 API
  version: 0.1.0
servers:
  - url: /api/v1
paths:
  /health:
    get:
      summary: 健康检查
      responses:
        "200":
          description: 服务可用
  /overview:
    get:
      summary: 平台总览摘要
      responses:
        "200":
          description: 返回服务、Pipeline、日志和告警摘要
  /services:
    get:
      summary: 服务目录列表
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: 按服务名、展示名、CMDB ID、业务 ID、应用 ID、负责人或告警路由搜索
        - name: environment
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, active, degraded]
        - name: source
          in: query
          schema:
            type: string
            enum: [manual, cmdb]
      responses:
        "200":
          description: 返回服务目录
    post:
      summary: 创建服务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, environment]
              properties:
                name:
                  type: string
                environment:
                  type: string
                owner_team:
                  type: string
                owner:
                  type: string
                alert_route:
                  type: string
                source:
                  type: string
                  enum: [manual, cmdb]
      responses:
        "201":
          description: 服务已创建
        "409":
          description: 相同服务身份或 CMDB 服务 ID 已存在
  /services/{id}:
    get:
      summary: 服务详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 返回服务详情
        "404":
          description: 服务不存在
    patch:
      summary: 更新服务目录条目
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cmdb_service_id:
                  type: string
                business_id:
                  type: string
                application_id:
                  type: string
                name:
                  type: string
                display_name:
                  type: string
                description:
                  type: string
                environment:
                  type: string
                cluster:
                  type: string
                namespace:
                  type: string
                owner_team:
                  type: string
                owner:
                  type: string
                alert_route:
                  type: string
                slo_level:
                  type: string
                status:
                  type: string
                  enum: [pending, active, degraded]
                sync_status:
                  type: string
                  enum: [local, synced, stale]
      responses:
        "200":
          description: 返回更新后的服务详情
        "404":
          description: 服务不存在
        "409":
          description: 更新后的服务身份或 CMDB 服务 ID 已存在
  /services/{id}/onboarding:
    get:
      summary: 获取服务接入工作台
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 返回服务、接入状态、身份、Collector 目标、生成配置和检查清单
    post:
      summary: 保存服务接入配置
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode, collector_group_id]
              properties:
                mode:
                  type: string
                  enum: [shared_gateway, dedicated_collector]
                collector_group_id:
                  type: string
                identity_type:
                  type: string
                  enum: [k8s_workload, host_process]
                  deprecated: true
                  description: 已迁移到服务目录字段；表示服务运行身份类型，未传时后端使用服务级 identity_type。
                k8s_namespace:
                  type: string
                k8s_workload:
                  type: string
      responses:
        "200":
          description: 返回保存后的服务接入工作台
        "400":
          description: 接入配置无效
  /services/{id}/onboarding/check:
    post:
      summary: 执行服务接入检查
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 返回检查后的服务接入工作台
        "400":
          description: 尚未保存接入配置或请求无效
  /collector-groups:
    get:
      summary: Collector Group 列表
      parameters:
        - name: environment
          in: query
          schema:
            type: string
        - name: cluster
          in: query
          schema:
            type: string
        - name: namespace
          in: query
          schema:
            type: string
        - name: mode
          in: query
          schema:
            type: string
            enum: [shared_gateway, dedicated_collector]
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, draining, disabled, deleted]
        - name: receiver_profile
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 返回共享 Gateway 和独立 Collector 分组
    post:
      summary: 创建 Collector Group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, mode]
              properties:
                name:
                  type: string
                display_name:
                  type: string
                description:
                  type: string
                mode:
                  type: string
                  enum: [shared_gateway, dedicated_collector]
                environment:
                  type: string
                cluster:
                  type: string
                namespace:
                  type: string
                owner_team:
                  type: string
                desired_replicas:
                  type: integer
                max_services:
                  type: integer
      responses:
        "201":
          description: Collector Group 已创建
  /collector-groups/{id}:
    get:
      summary: Collector Group 详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 返回 Collector Group 详情、配置 hash 和发布状态
        "404":
          description: Collector Group 不存在
    patch:
      summary: 更新 Collector Group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                description:
                  type: string
                status:
                  type: string
                  enum: [draft, active, draining, disabled, deleted]
                desired_replicas:
                  type: integer
                max_services:
                  type: integer
                receiver_profile:
                  type: string
                exporter_profile:
                  type: string
      responses:
        "200":
          description: 返回更新后的 Collector Group
        "404":
          description: Collector Group 不存在
    delete:
      summary: 删除 Collector Group
      description: >
        软删除 Collector Group。若存在在线实例、服务接入引用、enabled/published Pipeline Binding
        或未完成发布，默认返回 409；调用方应先迁移/解绑/停用依赖。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Collector Group 已删除
        "404":
          description: Collector Group 不存在
        "409":
          description: Collector Group 存在依赖，不能删除
  /collector-groups/{id}/instances:
    get:
      summary: Collector Group 实例列表
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 返回 OpAMP Collector 实例状态
  /collector-groups/{id}/config-versions:
    get:
      summary: Collector Group 配置版本历史
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 返回该 Collector Group 的配置版本历史
  /collector-groups/{id}/config/latest.yaml:
    get:
      summary: 获取 Collector Group 最新 Collector YAML
      description: 返回该 Collector Group 最新发布配置的原始 YAML，可直接作为 OTel Collector `--config=http://...` 使用。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 返回最新 Collector YAML
          headers:
            X-Collector-Config-Version:
              schema:
                type: string
              description: 最新配置版本号
            X-Collector-Config-Hash:
              schema:
                type: string
              description: 最新配置 hash
          content:
            application/x-yaml:
              schema:
                type: string
        "404":
          description: Collector Group 尚未发布配置
  /collector-groups/{id}/config/sources:
    get:
      summary: 获取 Collector Group 配置来源
      description: 按平台模板、Group Override、服务 Enrichment、业务 Patch 聚合配置来源，并返回 rendered Collector YAML、hash、warnings 和 errors。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 返回配置来源、rendered YAML 和 config hash
        "404":
          description: Collector Group 不存在
  /collector-groups/{id}/config/override:
    put:
      summary: 保存 Collector Group 增量配置
      description: 保存 Group 级 override YAML，不自动发布。最终配置由 sources 渲染得到。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                override_yaml:
                  type: string
      responses:
        "200":
          description: Group Override 已保存
        "400":
          description: YAML 无效
  /collector-groups/{id}/config/validate:
    post:
      summary: 校验 Collector Group 配置
      description: 聚合 sources 后渲染 Collector YAML，返回 rendered YAML、hash、source breakdown、warnings 和 errors。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 返回校验结果、rendered YAML 和 config hash
        "400":
          description: YAML 无效或配置为空
  /collector-groups/{id}/config/publish:
    post:
      summary: 发布 Collector Group 配置
      description: 聚合 sources 渲染最终 Collector YAML，创建配置版本，并通过 OpAMP Remote Config 下发给在线 Agent。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 返回新的配置版本，meta.active_delivery_count 表示主动下发数量
        "400":
          description: YAML 无效或配置为空
        "404":
          description: Collector Group 或平台模板不存在
  /collector-groups/{id}/config/status:
    get:
      summary: 获取 Collector Group 配置应用状态
      description: 返回期望 hash、最新配置版本和该 Group 下所有 Agent 的应用状态矩阵。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 返回 Agent 配置应用状态矩阵
  /collector-platform-templates:
    get:
      summary: 平台 Collector 模板列表
      description: 返回从 Agent effective config 导入或手工维护的平台父模板。平台不生成默认假 YAML。
      responses:
        "200":
          description: 返回平台模板列表
  /collector-platform-templates/import-from-agent:
    post:
      summary: 从 Agent Effective Config 导入平台模板
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                source_agent_uid:
                  type: string
                collector_group_id:
                  type: string
                base_yaml:
                  type: string
      responses:
        "200":
          description: 返回导入后的平台模板
        "400":
          description: 缺少 base_yaml 且 Agent 无 effective config
  /collector-platform-templates/{id}:
    get:
      summary: 获取平台 Collector 模板详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 返回平台模板
    put:
      summary: 更新平台 Collector 模板
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 返回更新后的平台模板
  /services/{id}/enrichment-patch:
    get:
      summary: 获取服务基础属性补齐 Patch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 返回 enrichment patch
  /services/{id}/enrichment-patch/regenerate:
    post:
      summary: 重新生成服务基础属性补齐 Patch
      responses:
        "200":
          description: 返回 enrichment patch
  /services/{id}/parser-rule:
    get:
      summary: 获取服务业务解析规则
      responses:
        "200":
          description: 返回 parser rule
    put:
      summary: 保存服务业务解析规则
      description: >
        支持 none、json、regex、ottl。json/regex 先从 parse_from 提取字段，再通过
        attribute_mappings/resource_mappings 生成 stanza move operators；字段映射格式为
        source -> target，数组和复杂处理建议使用 ottl。
      responses:
        "200":
          description: 返回 parser rule
  /services/{id}/parser-rule/preview:
    post:
      summary: 预览服务业务解析规则
      description: >
        regex 模式支持 Go regexp 命名分组。返回 parsed_fields、mapped_attributes、
        mapped_resources、unmapped_fields、warnings 和 errors，便于用户在发布前验证字段提取和标准化映射。
      responses:
        "200":
          description: 返回解析结果或错误列表
  /services/{id}/parser-rule/generate-patch:
    post:
      summary: 根据服务业务解析规则生成 Patch
      responses:
        "200":
          description: 返回 service pipeline patch
  /opamp/agents:
    get:
      summary: OpAMP Agent 列表
      description: 返回 DB 中 Collector Instance 与内存 OpAMP 连接状态合并后的视图，online 必须按 last_seen_at TTL 动态计算。
      responses:
        "200":
          description: 返回已发现的 Collector Agent
  /opamp/agents/{uid}:
    get:
      summary: OpAMP Agent 详情
      description: >
        返回单个 Agent 的运行状态、OpAMP attributes、effective configuration、latest remote configuration、
        Collector Group、服务接入、配置版本和 Additional Configuration 聚合视图。
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 返回 Agent detail 聚合视图
        "404":
          description: OpAMP Agent 不存在
  /opamp/instances/{uid}/group:
    post:
      summary: 将 Collector Instance 绑定到 Collector Group
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [group_id]
              properties:
                group_id:
                  type: string
      responses:
        "200":
          description: 返回绑定后的 Collector Instance
        "404":
          description: Collector Group 或 Instance 不存在
    delete:
      summary: 解除 Collector Instance 与 Collector Group 的绑定
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: 绑定已解除
        "404":
          description: Collector Instance 不存在
  /opamp/instances/{uid}:
    delete:
      summary: 删除离线 Collector Instance 记录
      description: 仅允许删除已离线或 stale 的实例记录；在线实例应先停止心跳并等待 TTL 过期。
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Collector Instance 记录已删除
        "409":
          description: Collector Instance 仍在线，不能删除
  /logs:
    get:
      summary: 查询日志
      parameters:
        - name: service
          in: query
          schema:
            type: string
        - name: environment
          in: query
          schema:
            type: string
        - name: level
          in: query
          schema:
            type: string
        - name: keyword
          in: query
          schema:
            type: string
        - name: trace_id
          in: query
          schema:
            type: string
        - name: request_id
          in: query
          schema:
            type: string
        - name: start
          in: query
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: 返回过滤后的日志
  /logs/endpoints:
    get:
      summary: 查询日志下游端点
      responses:
        "200":
          description: 返回 VictoriaLogs、OTel、ES 或 Kafka 日志下游端点
    post:
      summary: 创建日志下游端点
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogEndpointInput"
      responses:
        "201":
          description: 日志下游端点已创建
  /logs/endpoints/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    patch:
      summary: 更新日志下游端点
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogEndpointInput"
      responses:
        "200":
          description: 返回更新后的日志下游端点
  /logs/endpoints/{id}/vmalert-runtime/publish:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      summary: 部署端点级 vmalert Runtime
      description: 每个日志端点对应一个 vmalert Runtime；端点只作为 datasource，运行时可通过 deploy_cluster_id 部署到任一已授权 K8s 集群。首次请求返回待确认 YAML 与 confirmation token，携带 token 后执行部署。
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogRuntimePublishRequest"
      responses:
        "200":
          description: 返回 K8s 发布预览或应用结果、manifest YAML 和 artifact hash
  /observability/runtimes:
    get:
      summary: 查询观测运行时
      description: 返回 logs_collector、logs_vmalert、metrics_vmalert 等平台级运行时状态。
      responses:
        "200":
          description: 返回观测运行时列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ObservabilityRuntime"
  /observability/runtimes/logs-collector/publish:
    post:
      summary: 发布 K8s 日志采集运行时
      description: 以 cluster_id + namespace 为采集域，生成或更新唯一一套 logs_collector DaemonSet 与合并后的采集 ConfigMap；服务日志路由不再直接部署采集器。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/K8sCollectorRuntimePublishRequest"
      responses:
        "200":
          description: 返回 K8s 发布预览或应用结果、manifest YAML 和运行时状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/K8sCollectorRuntimePublishResult"
  /alerts/rules:
    get:
      summary: 查询日志告警规则
      responses:
        "200":
          description: 返回告警规则列表
    post:
      summary: 创建并启用日志告警规则
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertRuleChangeRequest"
      responses:
        "200":
          description: 规则生产真值、更新记录和审计已原子创建，规则等待 Runtime 发布
        "412":
          description: 历史日志测试凭据缺失或已失效
  /alerts/rules/test:
    post:
      summary: 使用历史 VictoriaLogs 数据测试规则
      responses:
        "200":
          description: 返回规范化 LogsQL、匹配数、实例预估和短期测试凭据
  /alerts/rules/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: 查询日志告警规则详情
      responses:
        "200":
          description: 返回规则详情
    put:
      summary: 更新并直接启用日志告警规则
      responses:
        "200":
          description: 已创建更新记录，规则等待 Runtime 发布
  /alerts/rules/{id}/disable:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      summary: 停用规则
      responses:
        "200":
          description: 已创建停用更新，规则等待 Runtime 发布
  /alerts/rules/{id}/updates:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: 查询弱化展示的规则更新记录
      responses:
        "200":
          description: 返回更新记录
  /alerts/rules/{id}/rollback:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      summary: 回退到指定更新记录
      responses:
        "200":
          description: 已创建新的回退更新，规则等待 Runtime 发布
  /alerts/instances:
    get:
      summary: 查询当前告警实例投影
      responses:
        "200":
          description: 返回当前 Pending、Firing 或 Resolved 实例
  /alerts/events:
    get:
      summary: 查询告警状态更新记录
      responses:
        "200":
          description: 返回不可变告警事件
  /alerts/notification-policies:
    get:
      summary: 查询当前主体可见的通知策略
      responses:
        "200":
          description: 返回全局和服务范围通知策略
    post:
      summary: 创建通知策略
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationPolicyInput"
      responses:
        "201":
          description: 通知策略和审计记录已原子创建
  /alerts/notification-policies/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    put:
      summary: 更新或停用通知策略
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationPolicyInput"
      responses:
        "200":
          description: 通知策略和审计记录已原子更新
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    LogEndpointInput:
      type: object
      required: [name, sink_type, write_url, scope_type]
      properties:
        name:
          type: string
        description:
          type: string
        sink_type:
          type: string
          enum: [vl, otel, es, kafka]
        stream_name:
          type: string
        write_url:
          type: string
        query_url:
          type: string
        vmui_url:
          type: string
        account_id:
          type: string
        project_id:
          type: string
        secret_ref:
          type: string
        scope_type:
          type: string
          enum: [global, k8s_cluster, vm]
        cluster_id:
          type: string
          description: K8s 集群级日志下游端点必须选择已登记 K8s 集群 ID
        status:
          type: string
          enum: [active, disabled]
    LogRuntimePublishRequest:
      type: object
      properties:
        deploy_cluster_id:
          type: string
          description: vmalert Runtime 的部署集群 ID；端点为 k8s_cluster 且为空时默认使用端点绑定集群，global/vm 端点必须显式填写
        namespace:
          type: string
          default: novaobs-system
          description: 固定平台 namespace；非 novaobs-system 会被拒绝
        alert_ingest_url:
          type: string
          description: NovaObs Alert Ingest 地址；为空时使用平台默认配置
        preview_id:
          type: string
        confirmation_token:
          type: string
    K8sCollectorRuntimePublishRequest:
      type: object
      required: [cluster_id]
      properties:
        cluster_id:
          type: string
          description: 日志采集运行时部署的 K8s 集群 ID
        namespace:
          type: string
          default: novaobs-system
          description: 平台采集器 namespace
        preview_id:
          type: string
        confirmation_token:
          type: string
    K8sCollectorRuntimePublishResult:
      type: object
      properties:
        runtime:
          $ref: "#/components/schemas/ObservabilityRuntime"
        manifest_yaml:
          type: string
        collector_yaml:
          type: string
        collector_config_hash:
          type: string
        manifest_hash:
          type: string
        status:
          type: string
        message:
          type: string
        requires_confirmation:
          type: boolean
        preview_id:
          type: string
        confirmation_token:
          type: string
        audit_id:
          type: string
        resources:
          type: array
          items:
            type: object
        diffs:
          type: array
          items:
            type: object
        warnings:
          type: array
          items:
            type: string
    ObservabilityRuntime:
      type: object
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [logs_collector, logs_vmalert, metrics_vmalert]
        signal_type:
          type: string
          enum: [logs, metrics]
        cluster_id:
          type: string
          description: 运行时实际部署集群 ID
        namespace:
          type: string
        endpoint_id:
          type: string
          description: vmalert datasource endpoint；采集器运行时为空
        collector_config_hash:
          type: string
        artifact_hash:
          type: string
        manifest_hash:
          type: string
        status:
          type: string
          enum: [pending_publish, previewed, ready, failed]
        last_preview_id:
          type: string
        last_audit_id:
          type: string
        last_published_at:
          type: string
          format: date-time
    AlertRuleChangeRequest:
      type: object
      required: [spec, test_token]
      properties:
        spec:
          $ref: "#/components/schemas/AlertRuleSpec"
        test_token:
          type: string
        change_summary:
          type: string
          maxLength: 500
    AlertRuleSpec:
      type: object
      required: [name, scope, query, trigger, grouping, notification]
      properties:
        name:
          type: string
          maxLength: 120
        scope:
          type: object
          required: [service_id, log_route_id, endpoint_id, account_id, project_id]
        query:
          type: object
          required: [mode, expression]
          properties:
            mode:
              type: string
              enum: [contains, exact, logsql]
            expression:
              type: string
              maxLength: 16384
        trigger:
          type: object
          description: 一期仅支持时间窗口累计匹配，不支持严格连续事件语义
        grouping:
          type: object
          description: 最多 3 个分组字段、最多 100 个实例
        notification:
          type: object
          required: [policy_id, severity, owner_team]
    NotificationPolicyInput:
      type: object
      required: [name, receiver, enabled]
      properties:
        name:
          type: string
          maxLength: 120
        description:
          type: string
        service_id:
          type: string
          description: 为空表示全局策略
        receiver:
          type: string
          pattern: "^[A-Za-z0-9][A-Za-z0-9_.-]{0,127}$"
          description: 平台通知出口的稳定 receiver 标识；不得传 URL 或凭据
        enabled:
          type: boolean
    Envelope:
      type: object
      required: [success, data, error, meta]
      properties:
        success:
          type: boolean
        data:
          nullable: true
        error:
          nullable: true
          $ref: "#/components/schemas/ErrorBody"
        meta:
          type: object
    ErrorBody:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
