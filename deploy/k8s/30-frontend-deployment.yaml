apiVersion: apps/v1
kind: Deployment
metadata:
  name: novaapm-frontend
  namespace: novaapm-system
  labels:
    app.kubernetes.io/name: novaapm-frontend
    app.kubernetes.io/part-of: novaapm
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: novaapm-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: novaapm-frontend
        app.kubernetes.io/part-of: novaapm
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: hub-test.service.ucloud.cn/logsplatfrom/novaapm-frontend:0.1.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: temp
              mountPath: /tmp/nginx
      volumes:
        - name: temp
          emptyDir:
            medium: Memory
            sizeLimit: 32Mi
      terminationGracePeriodSeconds: 15
